<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Sentinel-X{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root {
      --bg-dark: #0a0e1a;
      --bg-card: #0f1629;
      --bg-card2: #141c35;
      --accent: #00d4ff;
      --accent2: #7b2ff7;
      --danger: #ff3860;
      --warning: #ffdd57;
      --success: #23d160;
      --text-muted: #8892b0;
      --border: rgba(0,212,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: #ccd6f6;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .sidebar-brand .tagline {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .sidebar-nav { padding: 16px 0; flex: 1; }
    .nav-item a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-item a:hover, .nav-item a.active {
      color: var(--accent);
      background: rgba(0,212,255,0.06);
      border-left-color: var(--accent);
    }
    .nav-item a i { width: 18px; text-align: center; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .main-content {
      margin-left: 240px;
      min-height: 100vh;
    }
    .topbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title { font-size: 1.1rem; font-weight: 600; color: #e6f1ff; }
    .page-body { padding: 28px; }
    .card-dark {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card-dark2 {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
    }
    .stat-card.accent::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .stat-card.danger::before { background: var(--danger); }
    .stat-card.warning::before { background: var(--warning); }
    .stat-card.success::before { background: var(--success); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #e6f1ff; line-height: 1.2; margin-top: 4px; }
    .stat-icon { font-size: 1.8rem; opacity: 0.18; position: absolute; right: 20px; top: 20px; }
    .badge-severity-critical { background: rgba(255,56,96,0.15); color: var(--danger); border: 1px solid rgba(255,56,96,0.3); }
    .badge-severity-high { background: rgba(255,150,50,0.15); color: #ff9632; border: 1px solid rgba(255,150,50,0.3); }
    .badge-severity-medium { background: rgba(255,221,87,0.15); color: var(--warning); border: 1px solid rgba(255,221,87,0.3); }
    .badge-severity-low { background: rgba(35,209,96,0.1); color: var(--success); border: 1px solid rgba(35,209,96,0.2); }
    .badge-severity-info { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
    .progress-bar-custom {
      height: 6px;
      background: var(--bg-dark);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .table-dark-custom { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .table-dark-custom th {
      color: var(--text-muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .table-dark-custom td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #ccd6f6;
      vertical-align: middle;
    }
    .table-dark-custom tr:hover td { background: rgba(255,255,255,0.03); }
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-accent:hover { opacity: 0.85; color: #fff; }
    .btn-outline-accent {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline-accent:hover { background: rgba(0,212,255,0.1); }
    #refreshCountdown { color: var(--text-muted); font-size: 0.78rem; }
    .spinner-sm {
      width: 14px; height: 14px;
      border: 2px solid rgba(0,212,255,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 3px; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="logo"><i class="fas fa-shield-halved me-2"></i>Sentinel-X</div>
    <div class="tagline">Intrusion & Behavior Monitor</div>
  </div>
  <nav class="sidebar-nav">
    <ul class="nav-item list-unstyled mb-0">
      <li><a href="/" class="{% if request.path == '/' %}active{% endif %}"><i class="fas fa-gauge-high"></i> Dashboard</a></li>
      <li><a href="/alerts" class="{% if request.path == '/alerts' %}active{% endif %}"><i class="fas fa-bell"></i> Alerts</a></li>
      <li><a href="/logs" class="{% if request.path == '/logs' %}active{% endif %}"><i class="fas fa-list-ul"></i> Event Logs</a></li>
      <li><a href="/processes" class="{% if request.path == '/processes' %}active{% endif %}"><i class="fas fa-microchip"></i> Processes</a></li>
    </ul>
  </nav>
  <div class="sidebar-footer">
    <div class="status-dot"></div>
    <span>Monitoring Active</span>
  </div>
</div>
<div class="main-content">
  {% block content %}{% endblock %}
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
