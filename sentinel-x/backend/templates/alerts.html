{% extends "base.html" %}
{% block title %}Alerts — Sentinel-X{% endblock %}

{% block content %}
<div class="topbar">
  <div class="topbar-title"><i class="fas fa-bell me-2 text-warning"></i>Alerts</div>
  <div class="d-flex align-items-center gap-2">
    <button class="btn-outline-accent" onclick="triggerTestAlert()"><i class="fas fa-vial me-1"></i>Test Alert</button>
    <button class="btn-accent" onclick="loadAlerts()"><i class="fas fa-rotate me-1"></i>Refresh</button>
  </div>
</div>

<div class="page-body">
  <div class="row g-3 mb-4">
    <div class="col-md-3"><div class="stat-card danger"><div class="stat-label">Critical</div><div class="stat-value" id="criticalCount">—</div><i class="fas fa-skull-crossbones stat-icon"></i></div></div>
    <div class="col-md-3"><div class="stat-card warning"><div class="stat-label">High</div><div class="stat-value" id="highCount">—</div><i class="fas fa-exclamation-triangle stat-icon"></i></div></div>
    <div class="col-md-3"><div class="stat-card accent"><div class="stat-label">Medium</div><div class="stat-value" id="medCount">—</div><i class="fas fa-exclamation-circle stat-icon"></i></div></div>
    <div class="col-md-3"><div class="stat-card success"><div class="stat-label">Resolved</div><div class="stat-value" id="resolvedCount">—</div><i class="fas fa-check-circle stat-icon"></i></div></div>
  </div>

  <div class="card-dark mb-3">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h6 class="mb-0 text-info"><i class="fas fa-bell me-2"></i>All Alerts</h6>
      <div class="d-flex gap-2 flex-wrap">
        <select id="filterResolved" class="form-select form-select-sm" style="background:var(--bg-dark);color:#ccd6f6;border:1px solid var(--border);width:auto" onchange="loadAlerts()">
          <option value="">All</option>
          <option value="false">Open</option>
          <option value="true">Resolved</option>
        </select>
        <select id="filterSeverity" class="form-select form-select-sm" style="background:var(--bg-dark);color:#ccd6f6;border:1px solid var(--border);width:auto" onchange="loadAlerts()">
          <option value="">All Severities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div id="alertsTable">Loading…</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function severity_badge(sev) {
  return `<span class="badge badge-severity-${sev} rounded-pill">${sev.toUpperCase()}</span>`;
}

async function loadAlerts() {
  const resolved = document.getElementById('filterResolved').value;
  let url = '/api/alerts?limit=200';
  if (resolved !== '') url += `&resolved=${resolved}`;
  const r = await fetch(url);
  const d = await r.json();
  if (!d.success) return;

  const alerts = d.data;
  let critical=0, high=0, med=0, res=0;
  alerts.forEach(a => {
    if (a.severity === 'critical') critical++;
    else if (a.severity === 'high') high++;
    else if (a.severity === 'medium') med++;
    if (a.resolved) res++;
  });

  document.getElementById('criticalCount').textContent = critical;
  document.getElementById('highCount').textContent = high;
  document.getElementById('medCount').textContent = med;
  document.getElementById('resolvedCount').textContent = res;

  const filterSev = document.getElementById('filterSeverity').value;
  const filtered = filterSev ? alerts.filter(a => a.severity === filterSev) : alerts;

  if (filtered.length === 0) {
    document.getElementById('alertsTable').innerHTML = '<div class="text-muted text-center py-4"><i class="fas fa-check-circle me-2 text-success"></i>No alerts found</div>';
    return;
  }

  const rows = filtered.map(a => `
    <tr>
      <td>${severity_badge(a.severity)}</td>
      <td><span style="color:#e6f1ff;font-size:0.82rem">${a.alert_type}</span></td>
      <td style="max-width:320px;font-size:0.8rem;color:#8892b0">${a.message}</td>
      <td style="font-size:0.75rem;color:#8892b0;white-space:nowrap">${new Date(a.timestamp).toLocaleString()}</td>
      <td>${a.resolved ? '<span class="badge bg-success">Resolved</span>' : '<span class="badge bg-secondary">Open</span>'}</td>
      <td>${!a.resolved ? `<button class="btn-outline-accent" style="padding:4px 10px;font-size:0.75rem" onclick="resolveAlert(${a.id})">Resolve</button>` : ''}</td>
    </tr>
  `).join('');

  document.getElementById('alertsTable').innerHTML = `
    <div style="overflow-x:auto">
    <table class="table-dark-custom">
      <thead><tr><th>Severity</th><th>Type</th><th>Message</th><th>Time</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  `;
}

async function resolveAlert(id) {
  const r = await fetch(`/api/alerts/${id}/resolve`, {method:'POST'});
  const d = await r.json();
  if (d.success) loadAlerts();
}

async function triggerTestAlert() {
  const r = await fetch('/api/trigger-test-alert', {method:'POST'});
  const d = await r.json();
  if (d.success) { loadAlerts(); }
}

loadAlerts();
setInterval(loadAlerts, 30000);
</script>
{% endblock %}
